<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <link rel="stylesheet" href="person.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <h1>Profile</h1>
            <input class="searchBar" type="text" placeholder="Search...">
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="index.html" class="nav-link active">
                    <span class="material-icons">home</span>
                </a>
            </li>                                                                                                                                                                                                                                                                                                                                                                                                                           
            <li class="nav-item">
                <a href="videos.html" class="nav-link">
                    <span class="material-icons">play_circle</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="market.html" class="nav-link">
                    <span class="material-icons">shopping_cart</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="message.html" class="nav-link">
                    <span class="material-icons">message</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="notification.html" class="nav-link">
                    <span class="material-icons">notifications</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="person.html" class="nav-link">
                    <span class="material-icons">person</span>
                </a>
            </li>
        </ul>
    </nav>

  <main>
    <div class="profile-container">

    <div class="profile-header">
        <div class="cover-photo">
            <img src="imgs/Post-Content.jpg" alt="Cover Photo">
        </div>
        <div class="avatar-container">
            <img src="imgs/Profile-Picture.jpg" alt="User Avatar" id="avatar">
        </div>
    </div>

    <!-- User Information -->
    <div class="profile-info">
        <h1 class="user-name">Benny Musonda</h1>
        <p class="user-handle">@benny_musonda</p>
        <p class="user-headline">Graphic Designer & Frontend Developer </p>
        
        <!-- Action Buttons -->
        <div class="profile-actions">
            <button class="btn btn-primary" id="followBtn">Follow</button>
            <button class="btn btn-secondary" id="msgBtn">Message</button>
        </div>
    </div>

    <!-- Social Metrics -->
    <div class="profile-stats">
        <div class="stat-item">
            <span class="stat-value" id="followerCount">1.M</span>
            <span class="stat-label">Followers</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">2</span>
            <span class="stat-label">Following</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">100</span>
            <span class="stat-label">Posts</span>
        </div>
    </div>

    <!-- Navigation Tabs -->
    <div class="profile-tabs">
        <button class="tab-btn active" data-tab="posts">Posts</button>
        <button class="tab-btn" data-tab="about">About</button>
    </div>

    <!-- Tab Content Dynamic Area -->
    <div class="tab-content-wrapper">
        <div class="tab-panel active" id="posts">
            <div class="post-grid">
                <div class="post-card">Post 1</div>
                <div class="post-card"> Post 2</div>
                <div class="post-card"> Posts 3.</div>
            </div>
        </div>
        <div class="tab-panel" id="about">
            <div class="about-card">
                <h3>Biography</h3>
                <p>Building good web apps with remarkable user experience.</p>
            </div>
        </div>
    </div>
</div>
  </main>

   <script src="person.js" defer></script>
</body>
</html>
